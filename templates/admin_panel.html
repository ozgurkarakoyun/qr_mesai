<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Girişi - QR Yoklama</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0f172a;
    color: #f1f5f9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 20px;
    padding: 40px 32px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  .icon { font-size: 40px; margin-bottom: 16px; }
  h1   { font-size: 20px; margin-bottom: 6px; }
  .sub { color: #94a3b8; font-size: 13px; margin-bottom: 28px; }
  input {
    width: 100%;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 10px;
    color: #f1f5f9;
    font-size: 16px;
    padding: 14px 16px;
    margin-bottom: 14px;
    outline: none;
  }
  input:focus { border-color: #3b82f6; }
  button {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #3b82f6;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { background: #2563eb; }
  .hata {
    background: rgba(239,68,68,0.15);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 14px;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔐</div>
  <h1>Admin Paneli</h1>
  <p class="sub">QR Yoklama Sistemi</p>
  {% if hata %}
  <div class="hata">{{ hata }}</div>
  {% endif %}
  <form method="POST" action="/admin/login">
    <input type="password" name="sifre" placeholder="Admin şifresi" autofocus>
    <button type="submit">Giriş Yap</button>
  </form>
</div>
</body>
</html>
